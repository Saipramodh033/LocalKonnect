{% extends 'base/base.html' %}

{% block title %}Password Reset Complete - LocalKonnect{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-lg shadow-xl p-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 mb-6">
                <i class="fas fa-check text-2xl text-green-600"></i>
            </div>
            
            <h2 class="text-3xl font-bold mb-4">Password Reset Complete</h2>
            
            <p class="text-gray-600 mb-8">Your password has been successfully reset. You may go ahead and log in now.</p>
            
            <a href="{% url 'users:login' %}" class="inline-block bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors w-full">
                Log In
            </a>
        </div>
    </div>
</div>
{% endblock %}
